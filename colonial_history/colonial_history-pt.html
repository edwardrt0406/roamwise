h+='<div class="pw-info"><div class="pw-name" style="color:'+p.dk+'">'+p.n+'</div>';
h+='<div class="pw-desc">'+item.c+' 個殖民地 ('+year+'年)</div></div>';
if(item.c>0)h+='<span class="pw-count" style="background:'+p.c+'">'+item.c+'</span>';
h+='</div>';
});
/* method stats for current colonies */
var mCnts={};
for(var id in territories){var c=territories[id];if(c[4]&&MT[c[4]])mCnts[c[4]]=(mCnts[c[4]]||0)+1;}
h+='<div class="divider"></div><div class="stat-section"><div class="stat-title">🏛️ 獨立方式統計（現存殖民地）</div>';
var maxM=0;for(var k in mCnts)if(mCnts[k]>maxM)maxM=mCnts[k];
for(var k in MT){var c=mCnts[k]||0;if(c===0)continue;var pct=maxM?c/maxM*100:0;
h+='<div class="method-row"><span class="method-icon">'+MT[k].i+'</span><span style="flex:1;font-weight:600;font-size:.78rem">'+MT[k].n+'</span><div class="method-bar"><div class="method-fill" style="width:'+pct+'%;background:'+MT[k].c+'"></div></div><span class="method-num">'+c+'</span></div>';}
h+='</div>';
/* facts */
h+='<div class="divider"></div><div class="stat-section"><div class="stat-title">📖 歷史小知識</div>';
var facts=[
{i:'🇬🇧',t:'大英帝國鼎盛時期（約1920年）統治全球約25%的陸地面積與四分之一人口，是人類史上最大帝國。'},
{i:'🇪🇸',t:'西班牙帝國是第一個「日不落帝國」，16世紀控制美洲大部分地區。拉丁美洲的獨立浪潮（1810-1830）使其迅速瓦解。'},
{i:'🇫🇷',t:'1960年被稱為「非洲之年」，17個非洲國家同年獨立，其中14個為前法國殖民地。'},
{i:'🇵🇹',t:'葡萄牙是歐洲最早的殖民帝國，也是最後放手的 — 1999年澳門回歸中國標誌殖民時代正式終結。'},
{i:'🇧🇪',t:'利奧波德二世將剛果據為私人領地，其橡膠奴役政策導致數百萬剛果人死亡，被稱為「剛果恐怖」。'},
{i:'🇭🇹',t:'海地（1804年）是全球第一個由奴隸革命成功建立的共和國，也是拉丁美洲第一個獨立國家。'},
{i:'🇭🇰',t:'香港（1842-1997）和澳門（1557-1999）是歐洲在亞洲最後的殖民地，分別由英國和葡萄牙移交中國。'}
];
facts.forEach(function(f){h+='<div class="fact-item"><span class="fact-icon">'+f.i+'</span><span>'+f.t+'</span></div>'});
h+='</div>';
$pwP.innerHTML=h;
$pwT.textContent=sorted.filter(function(i){return i.c>0}).length+' 帝國';
$pwP.querySelectorAll('.pw-card').forEach(function(el){el.addEventListener('click',function(){var k=this.getAttribute('data-pw');if(selPW===k){selPW=null}else{selPW=k;locked=null;resetInfo()}updateMap();updatePanels()})});
/* right panel colony list */
var list=[];for(var id in territories){
var c=territories[id],pw=PW[c[1]],mt=MT[c[4]];
list.push({id:c[0],pw:c[1],s:c[2],e:c[3],m:c[4],n:c[5],name:nameOf(c[0]),flag:flagOf(c[0])});
}
list.sort(function(a,b){return a.name.localeCompare(b.name,'zh-Hant')});
if(selPW)list=list.filter(function(x){return x.pw===selPW});
var gh='';list.forEach(function(c){
var pw=PW[c.pw],mt=MT[c.m],dur=c.e-c.s,ac=locked===c.id?' active':'';
gh+='<div class="cc-item'+ac+'" data-id="'+c.id+'"><span class="cc-flag">'+c.flag+'</span>';
gh+='<div class="cc-info"><div class="cc-name">'+c.name+'</div>';
gh+='<div class="cc-sub"><span class="cc-lb" style="background:'+pw.c+'">'+pw.f+' '+pw.n+'</span>';
gh+='<span>'+c.s+'–'+c.e+' ('+dur+'年)</span>';
if(mt)gh+='<span class="cc-lb" style="background:'+mt.c+'">'+mt.i+'</span>';
gh+='</div></div></div>';
});
$cG.innerHTML=gh||'<div style="padding:2rem;text-align:center;color:#94a3b8;font-size:.9rem">📭 '+year+' 年沒有殖民地'+(selPW?' ('+PW[selPW].n+')':'')+'</div>';
$cG.querySelectorAll('.cc-item').forEach(function(el){el.addEventListener('click',function(){
var rid=this.getAttribute('data-id'),id=isNaN(+rid)?rid:+rid;
if(locked===id){locked=null;resetInfo();updateMap();updatePanels();return}
locked=id;selPW=null;showInfo(id,true);updateMap();updatePanels();
if(typeof id==='number')zoomTo(id);
})});
}
function zoomTo(id){
var el=cEls[id];if(!el)return;
var b=path.bounds(el.datum()),dx=b[1][0]-b[0][0],dy=b[1][1]-b[0][1],cx=(b[0][0]+b[1][0])/2,cy=(b[0][1]+b[1][1])/2;
var s=Math.max(1,Math.min(8,.85/Math.max(dx/W,dy/H)));
svg.transition().duration(500).call(zoom.transform,d3.zoomIdentity.translate(W/2-s*cx,H/2-s*cy).scale(s));
}
/* search */
$sIn.addEventListener('input',function(){
var q=this.value.trim().toLowerCase();if(!q){$sDD.classList.remove('show');return}
var ids=allIDs(),res=[];
ids.forEach(function(id){var n=nameOf(id);if(n.toLowerCase().indexOf(q)>-1||(A2[id]&&A2[id].toLowerCase().indexOf(q)>-1)){res.push({id:id,name:n,flag:flagOf(id)})}});
res.sort(function(a,b){return a.name.localeCompare(b.name,'zh-Hant')});
res=res.slice(0,10);
if(!res.length){$sDD.innerHTML='<div style="padding:.7rem;color:#94a3b8;text-align:center">找不到結果</div>';$sDD.classList.add('show');return}
var h='';res.forEach(function(r){
var col=getAt(r.id,year),hist=getHist(r.id);
h+='<div class="sd-item" data-id="'+r.id+'"><span style="font-size:1.1rem">'+r.flag+'</span><span style="font-weight:600;flex:1">'+r.name+'</span>';
if(col){var pw=PW[col[1]];h+='<span class="cc-lb" style="background:'+pw.c+'">'+pw.f+'</span>';}
else if(hist.length){h+='<span style="font-size:.7rem;color:#94a3b8">曾被殖民</span>';}
h+='</div>';
});
$sDD.innerHTML=h;$sDD.classList.add('show');
$sDD.querySelectorAll('.sd-item').forEach(function(el){el.addEventListener('click',function(){
var rid=this.getAttribute('data-id'),id=isNaN(+rid)?rid:+rid;
locked=id;selPW=null;$sIn.value=nameOf(id);showInfo(id,true);updateMap();updatePanels();
if(typeof id==='number')zoomTo(id);
$sDD.classList.remove('show');
})});
});
$sIn.addEventListener('blur',function(){setTimeout(function(){$sDD.classList.remove('show')},200)});
/* LOAD MAP */
d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(function(world){
var countries=topojson.feature(world,world.objects.countries).features;
g.selectAll('.country').data(countries).enter().append('path')
.attr('class','country').attr('data-id',function(d){return d.id}).attr('d',path)
.attr('fill','#f1f5f9').attr('stroke','#e2e8f0').attr('stroke-width',.3);
g.selectAll('.country').each(function(d){cEls[+d3.select(this).attr('data-id')]=d3.select(this)});
/* special markers HK, MO */
for(var sid in SP_LOC){
var xy=proj(SP_LOC[sid]);
g.append('circle').attr('class','special-marker').attr('data-id',sid)
.attr('cx',xy[0]).attr('cy',xy[1]).attr('r',4).attr('fill','#dc2626').attr('stroke','#fff').attr('stroke-width',1.5).attr('display','none');
}
/* hover */
g.selectAll('.country')
.on('mouseenter',function(){
if(locked!==null)return;var el=d3.select(this),id=+el.attr('data-id'),col=getAt(id,year);
if(col){el.attr('fill',PW[col[1]].dk).attr('stroke','#0f172a').attr('stroke-width',1)}
else{el.attr('fill','#e2e8f0').attr('stroke','#94a3b8').attr('stroke-width',.6)}
showInfo(id,false);$tip.classList.add('show');
})
.on('mousemove',function(ev){
if(locked!==null){$tip.classList.remove('show');return}
var id=+d3.select(this).attr('data-id'),col=getAt(id,year),hist=getHist(id);
var html='<span style="font-size:1.2rem;vertical-align:middle;margin-right:4px">'+flagOf(id)+'</span><b>'+nameOf(id)+'</b>';
if(col){var pw=PW[col[1]],mt=MT[col[4]];
html+='<br><span style="display:inline-block;padding:2px 7px;border-radius:5px;background:'+pw.c+';color:#fff;font-size:.72rem;font-weight:700;margin-top:4px">'+pw.f+' '+pw.n+' ('+col[2]+'–'+col[3]+')</span>';
if(mt)html+=' <span style="font-size:.72rem;color:'+mt.c+'">'+mt.i+' '+mt.n+'</span>';
html+='<br><span style="font-size:.75rem;color:#cbd5e1;margin-top:2px;display:block">'+col[5]+'</span>';
}else if(hist.length){
html+='<br><span style="font-size:.75rem;color:#86efac;margin-top:3px;display:block">'+year+'年未被殖民（曾有'+hist.length+'段殖民史）</span>';
}else{html+='<br><span style="font-size:.75rem;color:#86efac">從未被殖民</span>';}
$tip.innerHTML=html;
var tx=ev.clientX+14,ty=ev.clientY-80;if(tx+320>window.innerWidth)tx=ev.clientX-320;if(ty<10)ty=ev.clientY+20;
$tip.style.left=tx+'px';$tip.style.top=ty+'px';$tip.classList.add('show');
})
.on('mouseleave',function(){$tip.classList.remove('show');if(locked!==null)return;updateMap();resetInfo()})
.on('click',function(){
var id=+d3.select(this).attr('data-id');
if(locked===id){locked=null;selPW=null;resetInfo();updateMap();updatePanels();return}
locked=id;selPW=null;showInfo(id,true);updateMap();updatePanels();
});
/* special marker interactions */
g.selectAll('.special-marker')
.on('mouseenter',function(ev){
var el=d3.select(this),id=el.attr('data-id'),col=getAt(id,year);
if(!col)return;var pw=PW[col[1]];
$tip.innerHTML='<span style="font-size:1.2rem">'+flagOf(id)+'</span> <b>'+nameOf(id)+'</b><br><span style="display:inline-block;padding:2px 7px;border-radius:5px;background:'+pw.c+';color:#fff;font-size:.72rem;font-weight:700;margin-top:4px">'+pw.f+' '+pw.n+' ('+col[2]+'–'+col[3]+')</span><br><span style="font-size:.75rem;color:#cbd5e1">'+col[5]+'</span>';
var tx=ev.clientX+14,ty=ev.clientY-80;$tip.style.left=tx+'px';$tip.style.top=ty+'px';$tip.classList.add('show');
})
.on('mouseleave',function(){$tip.classList.remove('show')})
.on('click',function(){
var id=d3.select(this).attr('data-id');
if(locked===id){locked=null;resetInfo();updateMap();updatePanels();return}
locked=id;selPW=null;showInfo(id,true);updateMap();updatePanels();
});
document.getElementById('loadOv').style.display='none';
setYear(1492);
}).catch(function(){document.getElementById('loadOv').innerHTML='<p style="color:#ef4444">⚠️ 地圖載入失敗，請重新整理。</p>'});
})();
</script>
