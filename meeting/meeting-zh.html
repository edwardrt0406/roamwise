  padding:.5rem .75rem;border:1px solid #cbd5e1;border-radius:8px;font-size:1rem;background:#fff;

.field input[type="date"]:focus,
.field select:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.25)}

.stag{font-weight:700;font-size:.95rem;color:#334155;margin-bottom:.6rem}

.cities-wrap{display:flex;flex-wrap:wrap;gap:.75rem;align-items:flex-start}
.city-item{position:relative;display:flex;align-items:flex-end;gap:.35rem}
.city-input{
  padding:.5rem .65rem;border:1px solid #cbd5e1;border-radius:8px;font-size:.95rem;width:185px;
  background:#fff;color:#1e293b;
}
.city-input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.25)}

.city-dd{
  position:absolute;top:100%;left:0;width:240px;max-height:220px;overflow-y:auto;
  background:#fff;border:1px solid #cbd5e1;border-radius:8px;
  box-shadow:0 6px 20px rgba(0,0,0,.12);z-index:99;display:none;
}
.city-dd.show{display:block}
.city-dd-item{
  padding:.5rem .75rem;cursor:pointer;font-size:.9rem;
  display:flex;justify-content:space-between;align-items:center;
}
.city-dd-item:hover,
.city-dd-item.hl{background:#eff6ff}
.city-dd-item .en{color:#94a3b8;font-size:.8rem}

.btn-del{
  width:28px;height:28px;border-radius:50%;border:none;background:#ef4444;color:#fff;
  font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  margin-bottom:2px;flex-shrink:0;line-height:1;
}
.btn-del:hover{background:#dc2626}

.btn-add{
  margin-top:.85rem;padding:.55rem 1.3rem;border:none;border-radius:8px;
  background:#3b82f6;color:#fff;font-size:.95rem;cursor:pointer;font-weight:600;
}
.btn-add:hover{background:#2563eb}

.toast{
  position:fixed;top:1.5rem;left:50%;transform:translateX(-50%);
  background:#ef4444;color:#fff;padding:.65rem 1.5rem;border-radius:8px;
  font-size:.9rem;z-index:9999;opacity:0;pointer-events:none;
  box-shadow:0 4px 16px rgba(0,0,0,.18);transition:opacity .3s;
}
.toast.show{opacity:1;pointer-events:auto}

.results{overflow-x:auto}
.results h2{font-size:1.15rem;margin-bottom:1rem}
table{width:100%;border-collapse:collapse;min-width:300px}
th{padding:.7rem 1rem;text-align:center;font-weight:700;background:#f8fafc;border-bottom:2px solid #e2e8f0;white-space:nowrap;font-size:.9rem}

tr:hover td{background:#fafbfd}
.work{background:#dcfce7}
.sleep{color:#bcc5d3}

.legend span{display:inline-flex;align-items:center;gap:.3rem}

.dot-s{background:#f1f5f9;border:1px solid #cbd5e1}

  /* ===== 時區運算 ===== */
  function tzOffset(d, tz){
    var uStr = d.toLocaleString('en-US',{timeZone:'UTC'});
    var lStr = d.toLocaleString('en-US',{timeZone:tz});
    return new Date(lStr) - new Date(uStr);
  }

  function toUTC(y, m, d, hr, tz){
    var guess = new Date(Date.UTC(y, m-1, d, hr, 0, 0));
    var off = tzOffset(guess, tz);
    var approx = new Date(guess.getTime() - off);
    var off2 = tzOffset(approx, tz);
    return new Date(guess.getTime() - off2);
  }

  function fmtTime(d, tz){
    return new Intl.DateTimeFormat('en-GB',{timeZone:tz,hour:'2-digit',minute:'2-digit',hour12:false}).format(d).replace('24:','00:');
  }

    var matched = [];

      dd.innerHTML = '';
      hlIdx = -1;
      matched = [];
      var low = (q || '').toLowerCase();
      for(var i = 0; i < CITIES.length; i++){
        var c = CITIES[i];
        if(!q || c.n.indexOf(q) !== -1 || c.e.toLowerCase().indexOf(low) !== -1){
          matched.push(c);
        }
      }
      for(var j = 0; j < matched.length; j++){
        var item = document.createElement('div');
        item.className = 'city-dd-item';
        var s1 = document.createElement('span');
        s1.textContent = matched[j].n;
        var s2 = document.createElement('span');
        s2.className = 'en';
        s2.textContent = matched[j].e;
        item.appendChild(s1);
        item.appendChild(s2);
        (function(city){
          item.addEventListener('mousedown', function(ev){
            ev.preventDefault();
            selectCity(city);
          });
        })(matched[j]);
        dd.appendChild(item);
      }
      if(matched.length > 0){
        dd.classList.add('show');
      } else {
        dd.classList.remove('show');
      }
    }

      inp.value = c.n;
      data.tz = c.t;
      data.cn = c.n;

        items[k].classList.remove('hl');
      }
      if(hlIdx >= 0 && hlIdx < items.length){
        items[hlIdx].classList.add('hl');
        items[hlIdx].scrollIntoView({block:'nearest'});
      }
    }

    inp.addEventListener('focus', function(){
      buildList(inp.value);
    });

    inp.addEventListener('input', function(){
      data.tz = '';
      data.cn = '';
      buildList(inp.value);
      render();
    });

    inp.addEventListener('blur', function(){
      setTimeout(function(){ dd.classList.remove('show'); }, 180);
    });

    inp.addEventListener('keydown', function(ev){
      if(ev.key === 'ArrowDown'){
        ev.preventDefault();
        if(hlIdx < matched.length - 1) hlIdx++;
        updateHL();
      } else if(ev.key === 'ArrowUp'){
        ev.preventDefault();
        if(hlIdx > 0) hlIdx--;
        updateHL();
      } else if(ev.key === 'Enter'){
        ev.preventDefault();
        if(hlIdx >= 0 && hlIdx < matched.length){
          selectCity(matched[hlIdx]);
        }
      }
    });

    /* 預設城市 */
    if(defaultName){
      for(var m = 0; m < CITIES.length; m++){
        if(CITIES[m].n === defaultName){
          inp.value = CITIES[m].n;
          data.tz = CITIES[m].t;
          data.cn = CITIES[m].n;
          break;
        }
      }
    }

    /* 刪除按鈕 */
    var btnDel = document.createElement('button');
    btnDel.type = 'button';
    btnDel.className = 'btn-del';
    btnDel.innerHTML = '&#10005;';
    btnDel.addEventListener('click', function(){
      var all = elCityRow.querySelectorAll('.city-item');
      if(all.length <= 2){
        showToast('至少需要兩個城市');
        return;
      }
      wrap.remove();
      render();
    });

    wrap._data = data;
    wrap.appendChild(inp);
    wrap.appendChild(dd);
    wrap.appendChild(btnDel);
    elCityRow.appendChild(wrap);
    render();
  }

  /* ===== 新增按鈕 ===== */
  elBtnAdd.addEventListener('click', function(){
    addCity('');
  });

  /* ===== 繪製表格 ===== */
  function render(){
    var ds = elDate.value;
    var sh = parseInt(elStart.value, 10);
    var eh = parseInt(elEnd.value, 10);
    if(!ds){ elTable.innerHTML = '<p class="empty-msg">請選擇日期</p>'; return; }

    var items = elCityRow.querySelectorAll('.city-item');
    var ci = [];
    for(var i = 0; i < items.length; i++){
      var d = items[i]._data;
      if(d && d.tz && d.cn) ci.push({n:d.cn, t:d.tz});
    }

    if(ci.length < 2){
      elTable.innerHTML = '<p class="empty-msg">請選擇至少兩個城市以顯示結果</p>';
      return;
    }

    /* 小時列表 */
    var hrs = [];
    if(sh <= eh){
      for(var a = sh; a <= eh; a++) hrs.push({h:a, dayOff:0});
    } else {
      for(var b = sh; b < 24; b++) hrs.push({h:b, dayOff:0});
      for(var c = 0; c <= eh; c++) hrs.push({h:c, dayOff:1});
    }

    var parts = ds.split('-');
    var yr = parseInt(parts[0],10);
    var mo = parseInt(parts[1],10);
    var da = parseInt(parts[2],10);
    var refTZ = ci[0].t;

    /* 建表 */
    var html = '<table><thead><tr>';
    for(var j = 0; j < ci.length; j++){
      html += '<th>' + ci[j].n + '</th>';
    }
    html += '</tr></thead><tbody>';

    for(var r = 0; r < hrs.length; r++){
      var utc = toUTC(yr, mo, da + hrs[r].dayOff, hrs[r].h, refTZ);
      var refDay = fmtDay(utc, refTZ);
      html += '<tr>';
      for(var col = 0; col < ci.length; col++){
        var t = fmtTime(utc, ci[col].t);
        var tDay = fmtDay(utc, ci[col].t);
        var suffix = '';
        if(tDay > refDay) suffix = ' <small>+1</small>';
        else if(tDay < refDay) suffix = ' <small>\u22121</small>';

        var hour = getHour(utc, ci[col].t);
        var cls = '';
        if(hour >= 9 && hour < 18) cls = ' class="work"';
        else if(hour < 7 || hour >= 23) cls = ' class="sleep"';

        html += '<td' + cls + '>' + t + suffix + '</td>';
      }
      html += '</tr>';
    }
    html += '</tbody></table>';
    elTable.innerHTML = html;
  }

  /* ===== 監聽事件 ===== */
  elDate.addEventListener('change', render);
  elStart.addEventListener('change', render);
  elEnd.addEventListener('change', render);

  /* ===== 預設城市 ===== */
  addCity('台北');
  addCity('紐約');

})();
</script>


</body></html>
